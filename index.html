<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dragon Primordial — Intro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1920px;height:1080px;background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;}

.screen{width:1920px;height:1080px;position:relative;overflow:hidden;background:#000;}

.sparks{position:absolute;inset:0;pointer-events:none;}
.spark{position:absolute;border-radius:50%;animation:rise linear infinite;}
@keyframes rise{0%{transform:translateY(0) scale(1);opacity:.9;}100%{transform:translateY(-120px) scale(0);opacity:0;}}

.ring{position:absolute;border-radius:50%;border:1.5px solid;animation:expand linear infinite;}
@keyframes expand{0%{width:0;height:0;opacity:.7;transform:translate(-50%,-50%);}100%{width:1200px;height:1200px;opacity:0;transform:translate(-50%,-50%);}}

.glow{position:absolute;border-radius:50%;filter:blur(120px);animation:gpulse 3s ease-in-out infinite alternate;}
@keyframes gpulse{0%{opacity:.25;transform:scale(1);}100%{opacity:.5;transform:scale(1.2);}}

.scan{position:absolute;left:0;right:0;height:2px;background:rgba(255,0,0,.12);animation:scn 4s linear infinite;}
@keyframes scn{0%{top:-2px;}100%{top:1082px;}}

.corner{position:absolute;width:80px;height:80px;border-color:#6b0000;border-style:solid;opacity:.7;}
.ctleft{top:30px;left:30px;border-width:3px 0 0 3px;border-radius:6px 0 0 0;}
.ctright{top:30px;right:30px;border-width:3px 3px 0 0;border-radius:0 6px 0 0;}
.cbleft{bottom:30px;left:30px;border-width:0 0 3px 3px;border-radius:0 0 0 6px;}
.cbright{bottom:30px;right:30px;border-width:0 3px 3px 0;border-radius:0 0 6px 0;}

.hline{position:absolute;left:60px;right:60px;height:1px;background:linear-gradient(90deg,transparent,#6b0000,#cc0000,#6b0000,transparent);}

.main-title{font-size:96px;font-weight:900;color:#fff;letter-spacing:6px;text-transform:uppercase;line-height:1;text-align:center;}
.title-glow{text-shadow:0 0 40px #ff0000,0 0 80px #cc0000,0 0 120px #8b0000;animation:tglow 2s ease-in-out infinite alternate;}
@keyframes tglow{0%{text-shadow:0 0 30px #ff0000,0 0 60px #cc0000;}100%{text-shadow:0 0 60px #ff4444,0 0 100px #ff0000,0 0 140px #cc0000;}}

.subtitle{font-size:22px;letter-spacing:10px;color:#cc4444;text-transform:uppercase;text-align:center;margin-top:14px;}
.badge{display:inline-block;background:#6b0000;color:#ffaaaa;font-size:14px;letter-spacing:4px;padding:6px 20px;border:1px solid #cc0000;text-transform:uppercase;margin-top:18px;}

.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#8b0000,#cc0000,#ff0000,#cc0000,#8b0000,transparent);}
.top-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,#8b0000,#cc0000,#ff0000,#cc0000,#8b0000,transparent);}

.center-col{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:0;}

.dragon-svg{display:block;margin:0 auto 20px;}

.social-row{display:flex;gap:40px;margin-top:30px;justify-content:center;}
.social-pill{background:rgba(139,0,0,.4);border:1px solid #8b0000;padding:8px 24px;color:#ffaaaa;font-size:16px;letter-spacing:2px;border-radius:2px;}

.game-frame{
  position:absolute;left:80px;top:50%;transform:translateY(-50%);
  width:540px;height:352px;overflow:hidden;
  border:2px solid #8b0000;z-index:1;
  box-shadow:0 0 40px rgba(139,0,0,.55);
  animation:gfpulse 4s ease-in-out infinite alternate;
}
@keyframes gfpulse{
  0%{box-shadow:0 0 25px rgba(139,0,0,.4);}
  100%{box-shadow:0 0 65px rgba(204,0,0,.75),0 0 90px rgba(139,0,0,.3);}
}
.game-frame img{
  width:100%;height:100%;object-fit:cover;display:block;
  opacity:.62;filter:brightness(.75) contrast(1.15) saturate(1.25);
}
.game-frame-ov{
  position:absolute;inset:0;
  background:linear-gradient(to right,rgba(0,0,0,.7) 0%,transparent 40%,transparent 60%,rgba(0,0,0,.45) 100%);
}
.game-frame-lbl{
  position:absolute;bottom:0;left:0;right:0;
  text-align:center;padding:7px;
  background:rgba(100,0,0,.85);
  color:#ffaaaa;font-size:13px;letter-spacing:3px;text-transform:uppercase;
}

</style>
</head>

<script>
const COLS=['#ff0000','#cc0000','#ff4444','#ff6600','#ffaa00','#dd0000'];
function spawnParticles(containerId){
  const c=document.getElementById(containerId);
  if(!c)return;
  function mk(){
    const p=document.createElement('div');
    const sz=Math.random()*7+2;
    const col=COLS[Math.floor(Math.random()*COLS.length)];
    p.className='spark';
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${Math.random()*100}%;bottom:${Math.random()*20}%;animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*2}s;box-shadow:0 0 ${sz*2}px ${col};`;
    c.appendChild(p);
    setTimeout(()=>p.remove(),(3.5+Math.random()*2)*1000);
  }
  setInterval(mk,100);
  for(let i=0;i<30;i++)mk();
}
spawnParticles('sp-intro');
</script>

<script>
/* === SONIDO: INTRO ÉPICO === */
window.addEventListener('load', function () {
  setTimeout(function () {
    var A = new (window.AudioContext || window.webkitAudioContext)();

    /* — RUGIDO / RUMBLE — */
    var rbuf = A.createBuffer(1, A.sampleRate * 3, A.sampleRate);
    var rd = rbuf.getChannelData(0);
    for (var i = 0; i < rd.length; i++)
      rd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / rd.length, 0.3);
    var rum = A.createBufferSource(); rum.buffer = rbuf;
    var rlp = A.createBiquadFilter(); rlp.type = 'lowpass'; rlp.frequency.value = 90;
    var rg = A.createGain();
    rg.gain.setValueAtTime(0.6, A.currentTime);
    rg.gain.exponentialRampToValueAtTime(0.001, A.currentTime + 3);
    rum.connect(rlp); rlp.connect(rg); rg.connect(A.destination); rum.start();

    /* — FANFARRIA ASCENDENTE — */
    [[55, 0.4], [73, 0.9], [82, 1.3], [110, 1.7], [138, 2.1], [165, 2.4]].forEach(function (v) {
      var o = A.createOscillator(), g = A.createGain(), f = A.createBiquadFilter();
      o.type = 'sawtooth'; o.frequency.value = v[0];
      f.type = 'lowpass';
      f.frequency.setValueAtTime(300, A.currentTime + v[1]);
      f.frequency.exponentialRampToValueAtTime(2800, A.currentTime + v[1] + 1.5);
      g.gain.setValueAtTime(0, A.currentTime + v[1]);
      g.gain.linearRampToValueAtTime(0.14, A.currentTime + v[1] + 0.3);
      g.gain.linearRampToValueAtTime(0.07, A.currentTime + v[1] + 1.5);
      g.gain.exponentialRampToValueAtTime(0.001, A.currentTime + v[1] + 3.5);
      o.connect(f); f.connect(g); g.connect(A.destination);
      o.start(A.currentTime + v[1]); o.stop(A.currentTime + v[1] + 4);
    });

    /* — LOOP AMBIENTE (tras la fanfarria) — */
    setTimeout(function () {
      [55, 82, 110].forEach(function (fr, i) {
        var o = A.createOscillator(), g = A.createGain();
        var lf = A.createOscillator(), lg = A.createGain();
        o.type = 'sine'; o.frequency.value = fr;
        lf.frequency.value = 0.1 + i * 0.05; lg.gain.value = 1.8;
        lf.connect(lg); lg.connect(o.frequency);
        g.gain.setValueAtTime(0, A.currentTime);
        g.gain.linearRampToValueAtTime(0.05 - i * 0.01, A.currentTime + 3);
        o.connect(g); g.connect(A.destination); o.start(); lf.start();
      });
    }, 4500);

  }, 500);
});
</script>
